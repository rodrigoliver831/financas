<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro Mensal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-5 flex-wrap gap-3">
        <h1 class="m-0 fw-bold text-primary">Controle Financeiro Rodrigo</h1>
        <button class="btn btn-success" onclick="exportarCSV()">📥 Exportar CSV</button>
    </div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card p-4 h-100">
                <h3 class="card-title mb-4 h5 fw-bold" id="form-title">Novo Lançamento</h3>
                <form id="finance-form">
                    <input type="hidden" id="edit-id">
                    <div class="mb-3">
                        <label class="form-label">Tipo</label>
                        <select class="form-select" id="tipo" required>
                            <option value="entrada">Entrada (Receita)</option>
                            <option value="saida">Saída (Despesa)</option>
                            <option value="cofrinho">Cofrinho (Reserva)</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descrição</label>
                        <input type="text" class="form-control" id="descricao" placeholder="Ex: Salário, Mercado, Reserva..." required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Valor (R$)</label>
                        <input type="number" step="0.01" min="0.01" class="form-control" id="valor" placeholder="0.00" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Data do Lançamento</label>
                        <input type="date" class="form-control" id="data" required>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1" id="btn-submit">Cadastrar</button>
                        <button type="button" class="btn btn-outline-secondary d-none" id="btn-cancelar-edicao" onclick="cancelarEdicao()">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-4 h-100">
                <h3 class="card-title mb-4 h5 fw-bold">Consolidado Mês a Mês</h3>
                <div style="position: relative; height:300px;">
                    <canvas id="finance-chart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="card mt-4 p-4">
        <div class="row align-items-end mb-4 g-3">
            <div class="col-xl-3 col-lg-12">
                <h3 class="card-title m-0 h5 fw-bold">Consultar Lançamentos</h3>
            </div>
            
            <div class="col-xl-3 col-md-4">
                <label class="form-label small text-muted mb-1">Buscar por Descrição</label>
                <input type="text" id="busca-descricao" class="form-control" placeholder="Ex: Luz, Gas..." oninput="aplicarFiltrosGlobal()">
            </div>

            <div class="col-xl-4 col-md-5">
                <label class="form-label small text-muted mb-1">Período de Dias</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent text-muted small">De</span>
                    <input type="date" id="filtro-data-inicio" class="form-control" onchange="aplicarFiltrosGlobal()">
                    <span class="input-group-text bg-transparent text-muted small">Até</span>
                    <input type="date" id="filtro-data-fim" class="form-control" onchange="aplicarFiltrosGlobal()">
                </div>
            </div>

            <div class="col-xl-2 col-md-3">
                <div class="d-flex gap-2 w-100">
                    <button class="btn btn-primary flex-grow-1" type="button" onclick="aplicarFiltrosGlobal()">Filtrar</button>
                    <button class="btn btn-outline-secondary" type="button" onclick="limparFiltrosGlobal()" title="Limpar Filtros">Limpar</button>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-12 text-md-end">
                <div class="d-flex gap-2 justify-content-md-end flex-wrap">
                    <button class="btn btn-outline-secondary active" id="btn-todos" onclick="filtrarTipo('todos')">Todos</button>
                    <button class="btn btn-outline-success" id="btn-entradas" onclick="filtrarTipo('entrada')">Entradas</button>
                    <button class="btn btn-outline-danger" id="btn-saidas" onclick="filtrarTipo('saida')">Saídas</button>
                    <button class="btn btn-outline-info text-dark" id="btn-cofrinho" onclick="filtrarTipo('cofrinho')">Cofrinho</button>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-4" id="cards-resumo"></div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Data</th>
                        <th>Descrição</th>
                        <th>Tipo</th>
                        <th class="text-end">Valor</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 1. CORREÇÃO DA PERSISTÊNCIA: Carrega os dados salvos ou inicia um array vazio
    let lancamentos = JSON.parse(localStorage.getItem('lancamentos')) || [];
    
    let filtroAtual = 'todos';
    let termoBusca = '';
    let dataInicioFiltro = '';
    let dataFimFiltro = '';
    let meuGrafico = null;

    // Define a data de hoje no campo de cadastro
    document.getElementById('data').value = new Date().toISOString().substring(0, 10);

    // 2. ENVIO DO FORMULÁRIO
    document.getElementById('finance-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const idEdicao = document.getElementById('edit-id').value;
        const dataSelecionada = document.getElementById('data').value;
        
        const dadosForm = {
            tipo: document.getElementById('tipo').value,
            descricao: document.getElementById('descricao').value,
            valor: parseFloat(document.getElementById('valor').value),
            data: dataSelecionada
        };

        if (idEdicao) {
            lancamentos = lancamentos.map(l => l.id === parseInt(idEdicao) ? { ...l, ...dadosForm } : l);
            cancelarEdicao();
        } else {
            const novoLancamento = {
                id: Date.now(),
                ...dadosForm
            };
            lancamentos.push(novoLancamento);
        }

        salvarDados();
        
        // Limpa o formulário mas mantém a data atual preenchida
        document.getElementById('descricao').value = '';
        document.getElementById('valor').value = '';
        document.getElementById('data').value = new Date().toISOString().substring(0, 10);
        
        atualizarTela();
    });

    function salvarDados() {
        localStorage.setItem('lancamentos', JSON.stringify(lancamentos));
    }

    function deletar(id) {
        if (document.getElementById('edit-id').value == id) cancelarEdicao();
        lancamentos = lancamentos.filter(l => l.id !== id);
        salvarDados();
        atualizarTela();
    }

    function prepararEdicao(id) {
        const item = lancamentos.find(l => l.id === id);
        if (!item) return;

        document.getElementById('edit-id').value = item.id;
        document.getElementById('tipo').value = item.tipo;
        document.getElementById('descricao').value = item.descricao;
        document.getElementById('valor').value = item.valor;
        document.getElementById('data').value = item.data;

        document.getElementById('form-title').innerText = "Editar Lançamento";
        document.getElementById('btn-submit').innerText = "Salvar Alterações";
        document.getElementById('btn-submit').classList.replace('btn-primary', 'btn-warning');
        document.getElementById('btn-cancelar-edicao').classList.remove('d-none');
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelarEdicao() {
        document.getElementById('edit-id').value = '';
        document.getElementById('finance-form').reset();
        document.getElementById('data').value = new Date().toISOString().substring(0, 10);

        document.getElementById('form-title').innerText = "Novo Lançamento";
        document.getElementById('btn-submit').innerText = "Cadastrar";
        document.getElementById('btn-submit').classList.replace('btn-warning', 'btn-primary');
        document.getElementById('btn-cancelar-edicao').classList.add('d-none');
    }

    function exportarCSV() {
        if (lancamentos.length === 0) {
            alert('Não há dados para exportar.');
            return;
        }

        let csvContent = "\uFEFFData;Descrição;Tipo;Valor (R$)\n";
        const dadosOrdenados = [...lancamentos].sort((a, b) => a.data.localeCompare(b.data));

        dadosOrdenados.forEach(l => {
            const linha = [
                formatarData(l.data),
                l.descricao.replace(/;/g, ','),
                l.tipo.toUpperCase(),
                l.valor.toFixed(2).replace('.', ',')
            ];
            csvContent += linha.join(';') + '\n';
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `controle_financeiro_${new Date().toISOString().substring(0, 10)}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function filtrarTipo(tipo) {
        filtroAtual = tipo;
        document.getElementById('btn-todos').classList.toggle('active', tipo === 'todos');
        document.getElementById('btn-entradas').classList.toggle('active', tipo === 'entrada');
        document.getElementById('btn-saidas').classList.toggle('active', tipo === 'saida');
        document.getElementById('btn-cofrinho').classList.toggle('active', tipo === 'cofrinho');
        atualizarTela();
    }

    function aplicarFiltrosGlobal() {
        termoBusca = document.getElementById('busca-descricao').value.toLowerCase().trim();
        dataInicioFiltro = document.getElementById('filtro-data-inicio').value;
        dataFimFiltro = document.getElementById('filtro-data-fim').value;
        atualizarTela();
    }

    function limparFiltrosGlobal() {
        document.getElementById('busca-descricao').value = '';
        document.getElementById('filtro-data-inicio').value = '';
        document.getElementById('filtro-data-fim').value = '';
        termoBusca = '';
        dataInicioFiltro = '';
        dataFimFiltro = '';
        atualizarTela();
    }

    function formatarData(dataString) {
        if (!dataString) return '';
        const partes = dataString.split('-');
        if (partes.length !== 3) return dataString;
        return `${partes[2]}/${partes[1]}/${partes[0]}`;
    }

    function extrairAnoMes(dataString) {
        if (!dataString) return '';
        return dataString.substring(0, 7); 
    }

    function obterDadosFiltrados() {
        return lancamentos.filter(l => {
            const passaTipo = (filtroAtual === 'todos' || l.tipo === filtroAtual);
            const passaDescricao = l.descricao.toLowerCase().includes(termoBusca);
            const passaDataInicio = !dataInicioFiltro || l.data >= dataInicioFiltro;
            const passaDataFim = !dataFimFiltro || l.data <= dataFimFiltro;

            return passaTipo && passaDescricao && passaDataInicio && passaDataFim;
        });
    }

    function renderizarTabela() {
        const tbody = document.getElementById('table-body');
        const cardsResumo = document.getElementById('cards-resumo');
        tbody.innerHTML = '';

        const dadosFiltrados = obterDadosFiltrados();

        let totalEntradas = 0;
        let totalSaidas = 0;
        let totalCofrinho = 0;

        dadosFiltrados.forEach(l => {
            if (l.tipo === 'entrada') totalEntradas += l.valor;
            if (l.tipo === 'saida') totalSaidas += l.valor;
            if (l.tipo === 'cofrinho') totalCofrinho += l.valor;
        });

        const temFiltroAtivo = termoBusca || dataInicioFiltro || dataFimFiltro;
        const sufixoTitulo = temFiltroAtivo ? ` (Filtrado)` : '';
        const saldoLivre = totalEntradas - totalSaidas - totalCofrinho;
        
        if (filtroAtual === 'todos') {
            cardsResumo.innerHTML = `
                <div class="col-md-3">
                    <div class="p-3 border rounded bg-success-subtle text-success">
                        <small class="d-block text-uppercase fw-bold text-success">Total Entradas${sufixoTitulo}</small>
                        <span class="fs-5 fw-bold">R$ ${totalEntradas.toFixed(2)}</span>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="p-3 border rounded bg-danger-subtle text-danger">
                        <small class="d-block text-uppercase fw-bold text-danger">Total Saídas${sufixoTitulo}</small>
                        <span class="fs-5 fw-bold">R$ ${totalSaidas.toFixed(2)}</span>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="p-3 border rounded ${ saldoLivre >= 0 ? 'bg-primary-subtle text-primary' : 'bg-danger text-white' }">
                        <small class="d-block text-uppercase fw-bold ${ saldoLivre >= 0 ? 'text-muted' : 'text-white-50' }">Saldo Livre</small>
                        <span class="fs-5 fw-bold">R$ ${saldoLivre.toFixed(2)}</span>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="p-3 border rounded bg-info-subtle text-info-emphasis">
                        <small class="d-block text-uppercase fw-bold text-info-emphasis">Total Cofrinho 💰</small>
                        <span class="fs-5 fw-bold">R$ ${totalCofrinho.toFixed(2)}</span>
                    </div>
                </div>
            `;
        } else {
            const totalVisivel = dadosFiltrados.reduce((soma, item) => soma + item.valor, 0);
            const mapasCards = {
                'entrada': { classe: 'bg-success-subtle text-success', titulo: 'Total de Entradas', valor: totalVisivel },
                'saida': { classe: 'bg-danger-subtle text-danger', titulo: 'Total de Saídas', valor: totalVisivel },
                'cofrinho': { classe: 'bg-info-subtle text-info-emphasis', titulo: 'Total no Cofrinho 💰', valor: totalVisivel }
            };
            const cardAtivo = mapasCards[filtroAtual];
            cardsResumo.innerHTML = `
                <div class="col-12"><div class="p-3 border rounded ${cardAtivo.classe}">
                    <small class="d-block text-uppercase fw-bold text-muted">${cardAtivo.titulo}${sufixoTitulo}</small>
                    <span class="fs-4 fw-bold">R$ ${cardAtivo.valor.toFixed(2)}</span>
                </div></div>`;
        }

        const dadosOrdenadosTabela = [...dadosFiltrados].sort((a, b) => b.data.localeCompare(a.data));

        dadosOrdenadosTabela.forEach(l => {
            const tr = document.createElement('tr');
            let classeBadge = 'bg-secondary-subtle text-secondary-emphasis';
            let classeValor = 'text-secondary';
            let sinal = '';

            if (l.tipo === 'entrada') {
                classeBadge = 'bg-success-subtle text-success';
                classeValor = 'text-success';
                sinal = '+';
            } else if (l.tipo === 'saida') {
                classeBadge = 'bg-danger-subtle text-danger';
                classeValor = 'text-danger';
                sinal = '-';
            } else if (l.tipo === 'cofrinho') {
                classeBadge = 'bg-info-subtle text-info-emphasis';
                classeValor = 'text-info-emphasis';
                sinal = '💰';
            }

            tr.innerHTML = `
                <td><span class="badge bg-secondary-subtle text-secondary-emphasis">${formatarData(l.data)}</span></td>
                <td class="fw-medium">${l.descricao}</td>
                <td><span class="badge ${classeBadge}">${l.tipo === 'cofrinho' ? 'COFRINHO' : l.tipo.toUpperCase()}</span></td>
                <td class="text-end fw-bold ${classeValor}">${sinal} R$ ${l.valor.toFixed(2)}</td>
                <td class="text-center">
                    <button class="btn btn-sm btn-outline-warning me-1" onclick="prepararEdicao(${l.id})">Editar</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deletar(${l.id})">Excluir</button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        if (dadosFiltrados.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4">Nenhum lançamento encontrado para os filtros aplicados.</td></tr>`;
        }
    }

    function renderizarGrafico() {
        const consolidado = {};
        const dadosFiltrados = obterDadosFiltrados();
        
        dadosFiltrados.forEach(l => {
            const anoMes = extrairAnoMes(l.data);
            if (!anoMes) return;
            if (!consolidado[anoMes]) {
                consolidado[anoMes] = { entradas: 0, saidas: 0, cofrinho: 0 };
            }
            if (l.tipo === 'entrada') consolidado[anoMes].entradas += l.valor;
            if (l.tipo === 'saida') consolidado[anoMes].saidas += l.valor;
            if (l.tipo === 'cofrinho') consolidado[anoMes].cofrinho += l.valor;
        });

        const mesesOrdenados = Object.keys(consolidado).sort();
        const labelsMeses = mesesOrdenados.map(m => {
            const [ano, mes] = m.split('-');
            return `${mes}/${ano}`;
        });

        const datasets = [];
        
        if (filtroAtual === 'todos' || filtroAtual === 'entrada') {
            datasets.push({
                label: 'Entradas (R$)',
                data: mesesOrdenados.map(m => consolidado[m].entradas),
                backgroundColor: '#198754',
                borderRadius: 4
            });
        }
        if (filtroAtual === 'todos' || filtroAtual === 'saida') {
            datasets.push({
                label: 'Saídas (R$)',
                data: mesesOrdenados.map(m => consolidado[m].saidas),
                backgroundColor: '#dc3545',
                borderRadius: 4
            });
        }
        if (filtroAtual === 'todos' || filtroAtual === 'cofrinho') {
            datasets.push({
                label: 'Cofrinho (R$)',
                data: mesesOrdenados.map(m => consolidado[m].cofrinho),
                backgroundColor: '#0dcaf0',
                borderRadius: 4
            });
        }

        const ctx = document.getElementById('finance-chart').getContext('2d');

        if (meuGrafico) {
            meuGrafico.destroy();
        }

        meuGrafico = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labelsMeses,
                datasets: datasets
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { beginAtZero: true }
                }
            }
        });
    }

    function atualizarTela() {
        renderizarTabela();
        renderizarGrafico();
    }

    // Inicialização da tela
    atualizarTela();
</script>

</body>
</html>
