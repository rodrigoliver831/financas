<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle Financeiro Mensal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .transition-all { transition: all 0.3s ease; }
    </style>
</head>
<body>

<div class="container py-5">
    <header class="d-flex justify-content-between align-items-center mb-5 flex-wrap gap-3">
        <h1 class="m-0 fw-bold text-primary">Controle Financeiro <span style="color: #000000; font-family: 'Shadows Into Light', cursive;">Rodrigo®</span></h1>
        <div class="d-flex gap-2">
            <button class="btn btn-outline-primary" onclick="enviarPorEmail()">📧 Enviar por E-mail</button>
            <button class="btn btn-success" onclick="exportarCSV()">📥 Exportar CSV</button>
        </div>
    </header>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="card p-4 h-100">
                <h3 class="card-title mb-4 h5 fw-bold" id="form-title">Novo Lançamento</h3>
                <form id="finance-form">
                    <input type="hidden" id="edit-id">
                    
                    <div class="mb-3">
                        <label for="tipo" class="form-label">Tipo</label>
                        <select class="form-select" id="tipo" required>
                            <option value="entrada">Entrada (Receita)</option>
                            <option value="saida">Saída (Despesa)</option>
                            <option value="cofrinho">Cofrinho (Reserva)</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="descricao" class="form-label">Descrição</label>
                        <input type="text" class="form-control" id="descricao" placeholder="Ex: Salário, Mercado..." required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="valor" class="form-label">Valor (R$)</label>
                        <input type="number" step="0.01" min="0.01" class="form-control" id="valor" placeholder="0.00" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="data" class="form-label">Data do Lançamento</label>
                        <input type="date" class="form-control" id="data" required>
                    </div>
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary flex-grow-1" id="btn-submit">Cadastrar</button>
                        <button type="button" class="btn btn-outline-secondary d-none" id="btn-cancelar-edicao" onclick="cancelarEdicao()">Cancelar</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-4 h-100">
                <h3 class="card-title mb-4 h5 fw-bold">Consolidado Mês a Mês</h3>
                <div style="position: relative; height:300px;">
                    <canvas id="finance-chart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <div class="card mt-4 p-4">
        <div class="row align-items-end mb-4 g-3">
            <div class="col-xl-3 col-lg-12">
                <h3 class="card-title m-0 h5 fw-bold">Consultar Lançamentos</h3>
            </div>
            
            <div class="col-xl-3 col-md-4">
                <label for="busca-descricao" class="form-label small text-muted mb-1">Buscar por Descrição</label>
                <input type="text" id="busca-descricao" class="form-control" placeholder="Ex: Luz, Gás..." oninput="aplicarFiltrosGlobal()">
            </div>

            <div class="col-xl-4 col-md-5">
                <label class="form-label small text-muted mb-1">Período de Dias</label>
                <div class="input-group">
                    <span class="input-group-text bg-transparent text-muted small">De</span>
                    <input type="date" id="filtro-data-inicio" class="form-control" onchange="aplicarFiltrosGlobal()">
                    <span class="input-group-text bg-transparent text-muted small">Até</span>
                    <input type="date" id="filtro-data-fim" class="form-control" onchange="aplicarFiltrosGlobal()">
                </div>
            </div>

            <div class="col-xl-2 col-md-3">
                <div class="d-flex gap-2 w-100">
                    <button class="btn btn-primary flex-grow-1" type="button" onclick="aplicarFiltrosGlobal()">Filtrar</button>
                    <button class="btn btn-outline-secondary" type="button" onclick="limparFiltrosGlobal()" title="Limpar Filtros">Limpar</button>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-12 text-md-end">
                <div class="d-flex gap-2 justify-content-md-end flex-wrap">
                    <button class="btn btn-outline-secondary active" id="btn-todos" onclick="filtrarTipo('todos')">Todos</button>
                    <button class="btn btn-outline-success" id="btn-entrada" onclick="filtrarTipo('entrada')">Entradas</button>
                    <button class="btn btn-outline-danger" id="btn-saida" onclick="filtrarTipo('saida')">Saídas</button>
                    <button class="btn btn-outline-info text-dark" id="btn-cofrinho" onclick="filtrarTipo('cofrinho')">Cofrinho</button>
                </div>
            </div>
        </div>

        <div class="row g-3 mb-4" id="cards-resumo"></div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-light">
                    <tr>
                        <th>Data</th>
                        <th>Descrição</th>
                        <th>Tipo</th>
                        <th class="text-end">Valor</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // Gerenciamento de Estado Global
    let lancamentos = JSON.parse(localStorage.getItem('lancamentos')) || [];
    let filtroAtual = 'todos';
    let termoBusca = '';
    let dataInicioFiltro = '';
    let dataFimFiltro = '';
    let meuGrafico = null;
    let debounceTimer;

    // Helper para obter a data local no formato AAAA-MM-DD (Corrige bug do fuso horário UTC)
    function obterDataLocalAtual() {
        const hoje = new Date();
        const ano = hoje.getFullYear();
        const mes = String(hoje.getMonth() + 1).padStart(2, '0');
        const dia = String(hoje.getDate()).padStart(2, '0');
        return `${ano}-${mes}-${dia}`;
    }

    // Define a data padrão do formulário como a data de hoje local
    document.getElementById('data').value = obterDataLocalAtual();

    // Manipulação do Formulário (Inserção e Edição)
    document.getElementById('finance-form').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const idEdicao = document.getElementById('edit-id').value;
        const valorInput = parseFloat(document.getElementById('valor').value);

        if (isNaN(valorInput) || valorInput <= 0) {
            alert('Por favor, insira um valor válido maior que zero.');
            return;
        }
        
        const dadosForm = {
            tipo: document.getElementById('tipo').value,
            descricao: document.getElementById('descricao').value.trim(),
            valor: valorInput,
            data: document.getElementById('data').value
        };

        if (idEdicao) {
            // Modo Edição
            lancamentos = lancamentos.map(l => l.id === parseInt(idEdicao) ? { ...l, ...dadosForm } : l);
            cancelarEdicao();
        } else {
            // Modo Cadastro Novo
            lancamentos.push({ id: Date.now(), ...dadosForm });
        }

        salvarDados();
        document.getElementById('descricao').value = '';
        document.getElementById('valor').value = '';
        document.getElementById('data').value = obterDataLocalAtual();
        
        atualizarTela();
    });

    function salvarDados() {
        localStorage.setItem('lancamentos', JSON.stringify(lancamentos));
    }

    function deletar(id) {
        if (confirm('Tem certeza que deseja excluir este lançamento?')) {
            if (document.getElementById('edit-id').value == id) cancelarEdicao();
            lancamentos = lancamentos.filter(l => l.id !== id);
            salvarDados();
            atualizarTela();
        }
    }

    function prepararEdicao(id) {
        const item = lancamentos.find(l => l.id === id);
        if (!item) return;

        document.getElementById('edit-id').value = item.id;
        document.getElementById('tipo').value = item.tipo;
        document.getElementById('descricao').value = item.descricao;
        document.getElementById('valor').value = item.valor;
        document.getElementById('data').value = item.data;

        document.getElementById('form-title').innerText = "Editar Lançamento";
        document.getElementById('btn-submit').innerText = "Salvar Alterações";
        document.getElementById('btn-submit').classList.replace('btn-primary', 'btn-warning');
        document.getElementById('btn-cancelar-edicao').classList.remove('d-none');
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cancelarEdicao() {
        document.getElementById('edit-id').value = '';
        document.getElementById('finance-form').reset();
        document.getElementById('data').value = obterDataLocalAtual();

        document.getElementById('form-title').innerText = "Novo Lançamento";
        document.getElementById('btn-submit').innerText = "Cadastrar";
        document.getElementById('btn-submit').classList.replace('btn-warning', 'btn-primary');
        document.getElementById('btn-cancelar-edicao').classList.add('d-none');
    }

    function exportarCSV() {
        if (lancamentos.length === 0) {
            alert('Não há dados para exportar.');
            return;
        }

        let csvContent = "\uFEFFData;Descrição;Tipo;Valor (R$)\n";
        const dadosOrdenados = [...lancamentos].sort((a, b) => a.data.localeCompare(b.data));

        dadosOrdenados.forEach(l => {
            const linha = [
                formatarData(l.data),
                l.descricao.replace(/;/g, ','),
                l.tipo.toUpperCase(),
                l.valor.toFixed(2).replace('.', ',')
            ];
            csvContent += linha.join(';') + '\n';
        });

        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `controle_financeiro_${obterDataLocalAtual()}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function enviarPorEmail() {
        const dadosFiltrados = obterDadosFiltrados();
        
        if (dadosFiltrados.length === 0) {
            alert('Não há lançamentos exibidos na tela para enviar por e-mail.');
            return;
        }

        let totalEntradas = 0, totalSaidas = 0, totalCofrinho = 0;
        let corpoEmail = "Resumo do Controle Financeiro\n";
        corpoEmail += "=====================================\n\n";
        corpoEmail += "Lançamentos:\n";

        const dadosOrdenados = [...dadosFiltrados].sort((a, b) => a.data.localeCompare(b.data));

        dadosOrdenados.forEach(l => {
            if (l.tipo === 'entrada') totalEntradas += l.valor;
            if (l.tipo === 'saida') totalSaidas += l.valor;
            if (l.tipo === 'cofrinho') totalCofrinho += l.valor;

            const valorFormatado = l.valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            corpoEmail += `• [${formatarData(l.data)}] ${l.descricao} (${l.tipo.toUpperCase()}): ${valorFormatado}\n`;
        });

        const saldoLivre = totalEntradas - totalSaidas - totalCofrinho;

        corpoEmail += "\n=====================================\n";
        corpoEmail += `Total de Entradas: ${totalEntradas.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}\n`;
        corpoEmail += `Total de Saídas: ${totalSaidas.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}\n`;
        corpoEmail += `Retido no Cofrinho: ${totalCofrinho.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}\n`;
        corpoEmail += `SALDO LIVRE ATUAL: ${saldoLivre.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}\n`;
        corpoEmail += "=====================================\n\n";
        corpoEmail += "Enviado através do Controle Financeiro Rodrigo.";

        const assunto = encodeURIComponent(`Controle Financeiro Mensal - ${formatarData(obterDataLocalAtual())}`);
        const corpoFormatado = encodeURIComponent(corpoEmail);

        window.location.href = `mailto:?subject=${assunto}&body=${corpoFormatado}`;
    }

    // Regras de Filtros Globais e Dinâmicos
    function filtrarTipo(tipo) {
        filtroAtual = tipo;
        const idsBotoes = ['btn-todos', 'btn-entrada', 'btn-saida', 'btn-cofrinho'];
        idsBotoes.forEach(id => {
            document.getElementById(id).classList.remove('active');
        });
        document.getElementById(`btn-${tipo}`).classList.add('active');
        atualizarTela();
    }

    function aplicarFiltrosGlobal() {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
            termoBusca = document.getElementById('busca-descricao').value.toLowerCase().trim();
            dataInicioFiltro = document.getElementById('filtro-data-inicio').value;
            dataFimFiltro = document.getElementById('filtro-data-fim').value;
            atualizarTela();
        }, 300);
    }

    function limparFiltrosGlobal() {
        document.getElementById('busca-descricao').value = '';
        document.getElementById('filtro-data-inicio').value = '';
        document.getElementById('filtro-data-fim').value = '';
        termoBusca = '';
        dataInicioFiltro = '';
        dataFimFiltro = '';
        atualizarTela();
    }

    // Helpers Utilitários
    function formatarData(dataString) {
        if (!dataString) return '';
        const [ano, mes, dia] = dataString.split('-');
        return `${dia}/${mes}/${ano}`;
    }

    // Extrai o ano e o mês para agrupar no gráfico
    function extrairAnoMes(dataString) {
        return dataString ? dataString.substring(0, 7) : ''; 
    }

    function obterDadosFiltrados() {
        return lancamentos.filter(l => {
            const passaTipo = (filtroAtual === 'todos' || l.tipo === filtroAtual);
            const passaDescricao = l.descricao.toLowerCase().includes(termoBusca);
            const passaDataInicio = !dataInicioFiltro || l.data >= dataInicioFiltro;
            const passaDataFim = !dataFimFiltro || l.data <= dataFimFiltro;
            return passaTipo && passaDescricao && passaDataInicio && passaDataFim;
        });
    }

    // Renderização dos Componentes Visuais
    function renderizarTabela() {
        const tbody = document.getElementById('table-body');
        const cardsResumo = document.getElementById('cards-resumo');
        tbody.innerHTML = '';

        const dadosFiltrados = obterDadosFiltrados();
        let totalEntradas = 0, totalSaidas = 0, totalCofrinho = 0;

        dadosFiltrados.forEach(l => {
            if (l.tipo === 'entrada') totalEntradas += l.valor;
            if (l.tipo === 'saida') totalSaidas += l.valor;
            if (l.tipo === 'cofrinho') totalCofrinho += l.valor;
        });

        const temFiltroAtivo = termoBusca || dataInicioFiltro || dataFimFiltro;
        const sufixoTitulo = temFiltroAtivo ? ` (Filtrado)` : '';
        const saldoLivre = totalEntradas - totalSaidas - totalCofrinho;
        
        if (filtroAtual === 'todos') {
            cardsResumo.innerHTML = `
                <div class="col-md-3">
                    <div class="p-3 border rounded bg-success-subtle text-success transition-all">
                        <small class="d-block text-uppercase fw-bold text-success">Total Entradas${sufixoTitulo}</small>
                        <span class="fs-5 fw-bold">R$ ${totalEntradas.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="p-3 border rounded bg-danger-subtle text-danger transition-all">
                        <small class="d-block text-uppercase fw-bold text-danger">Total Saídas${sufixoTitulo}</small>
                        <span class="fs-5 fw-bold">R$ ${totalSaidas.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="p-3 border rounded ${ saldoLivre >= 0 ? 'bg-primary-subtle text-primary' : 'bg-danger text-white' } transition-all">
                        <small class="d-block text-uppercase fw-bold ${ saldoLivre >= 0 ? 'text-muted' : 'text-white-50' }">Saldo Livre</small>
                        <span class="fs-5 fw-bold">R$ ${saldoLivre.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="p-3 border rounded bg-info-subtle text-info-emphasis transition-all">
                        <small class="d-block text-uppercase fw-bold text-info-emphasis">Total Cofrinho 💰</small>
                        <span class="fs-5 fw-bold">R$ ${totalCofrinho.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                    </div>
                </div>
            `;
        } else {
            const totalVisivel = dadosFiltrados.reduce((soma, item) => soma + item.valor, 0);
            const mapasCards = {
                'entrada': { classe: 'bg-success-subtle text-success', titulo: 'Total de Entradas', valor: totalVisivel },
                'saida': { classe: 'bg-danger-subtle text-danger', titulo: 'Total de Saídas', valor: totalVisivel },
                'cofrinho': { classe: 'bg-info-subtle text-info-emphasis', titulo: 'Total no Cofrinho 💰', valor: totalVisivel }
            };
            const cardAtivo = mapasCards[filtroAtual];
            cardsResumo.innerHTML = `
                <div class="col-12"><div class="p-3 border rounded ${cardAtivo.classe}">
                    <small class="d-block text-uppercase fw-bold text-muted">${cardAtivo.titulo}${sufixoTitulo}</small>
                    <span class="fs-4 fw-bold">R$ ${cardAtivo.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                </div></div>`;
        }

        const dadosOrdenadosTabela = [...dadosFiltrados].sort((a, b) => b.data.localeCompare(a.data));

        dadosOrdenadosTabela.forEach(l => {
            const tr = document.createElement('tr');
            let classeBadge = 'bg-secondary-subtle text-secondary-emphasis', classeValor = 'text-secondary', sinal = '';

            if (l.tipo === 'entrada') { classeBadge = 'bg-success-subtle text-success'; classeValor = 'text-success'; sinal = '+'; }
            else if (l.tipo === 'saida') { classeBadge = 'bg-danger-subtle text-danger'; classeValor = 'text-danger'; sinal = '-'; }
            else if (l.tipo === 'cofrinho') { classeBadge = 'bg-info-subtle text-info-emphasis'; classeValor = 'text-info-emphasis'; sinal = '💰'; }

            tr.innerHTML = `
                <td><span class="badge bg-secondary-subtle text-secondary-emphasis">${formatarData(l.data)}</span></td>
                <td class="fw-medium">${l.descricao}</td>
                <td><span class="badge ${classeBadge}">${l.tipo.toUpperCase()}</span></td>
                <td class="text-end fw-bold ${classeValor}">${sinal} R$ ${l.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</td>
                <td class="text-center">
                    <button class="btn btn-sm btn-outline-warning me-1" onclick="prepararEdicao(${l.id})">Editar</button>
                    <button class="btn btn-sm btn-outline-danger" onclick="deletar(${l.id})">Excluir</button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        if (dadosFiltrados.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4">Nenhum lançamento encontrado para os filtros aplicados.</td></tr>`;
        }
    }

    function renderizarGrafico() {
        const consolidado = {};
        
        // Melhoria: O gráfico reflete apenas o tipo de botão ativo (todos, entrada, etc.), ignorando a busca textual
        const dadosParaGrafico = lancamentos.filter(l => filtroAtual === 'todos' || l.tipo === filtroAtual);
        
        dadosParaGrafico.forEach(l => {
            const anoMes = extrairAnoMes(l.data);
            if (!anoMes) return;
            if (!consolidado[anoMes]) {
                consolidado[anoMes] = { entradas: 0, saidas: 0, cofrinho: 0 };
            }
            if (l.tipo === 'entrada') consolidado[anoMes].entradas += l.valor;
            if (l.tipo === 'saida') consolidado[anoMes].saidas += l.valor;
            if (l.tipo === 'cofrinho') consolidado[anoMes].cofrinho += l.valor;
        });

        const mesesOrdenados = Object.keys(consolidado).sort();
        const labelsMeses = mesesOrdenados.map(m => {
            const [ano, mes] = m.split('-');
            return `${mes}/${ano}`;
        });

        const datasets = [];
        
        if (filtroAtual === 'todos' || filtroAtual === 'entrada') {
            datasets.push({
                label: 'Entradas (R$)',
                data: mesesOrdenados.map(m => consolidado[m].entradas),
                backgroundColor: '#198754',
                borderRadius: 4
            });
        }
        if (filtroAtual === 'todos' || filtroAtual === 'saida') {
            datasets.push({
                label: 'Saídas (R$)',
                data: mesesOrdenados.map(m => consolidado[m].saidas),
                backgroundColor: '#dc3545',
                borderRadius: 4
            });
        }
        if (filtroAtual === 'todos' || filtroAtual === 'cofrinho') {
            datasets.push({
                label: 'Cofrinho (R$)',
                data: mesesOrdenados.map(m => consolidado[m].cofrinho),
                backgroundColor: '#0dcaf0',
                borderRadius: 4
            });
        }

        const ctx = document.getElementById('finance-chart').getContext('2d');

        if (meuGrafico) {
            meuGrafico.destroy();
        }

        meuGrafico = new Chart(ctx, {
            type: 'bar',
            data: { labels: labelsMeses, datasets: datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true } }
            }
        });
    }

    function atualizarTela() {
        renderizarTabela();
        renderizarGrafico();
    }

    // Inicialização da aplicação
    atualizarTela();
</script>

</body>
</html>
